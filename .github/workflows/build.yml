name: Build

on:
  push:

permissions:
  contents: read

jobs:
  build:
    name: Build ${{ matrix.platform }} (${{ matrix.arch }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            platform: linux
            arch: x64
          - os: ubuntu-22.04-arm
            platform: linux
            arch: arm64
          - os: macos-15-intel
            platform: macos
            arch: x64
          - os: macos-14
            platform: macos
            arch: arm64
          - os: windows-2025
            platform: windows
            arch: x64
          - os: windows-11-arm
            platform: windows
            arch: arm64

    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # 6.4.0
        with:
          node-version: lts/*
          check-latest: true

      - name: Install pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: latest

      - name: Install dependencies
        run: pnpm install

      - name: Typecheck
        run: pnpm typecheck

      - name: Build unpacked Electron app
        run: pnpm build:electron:dir -- --${{ matrix.arch }}

      - name: Upload artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # 7.0.1
        with:
          name: electron-${{ matrix.platform }}-${{ matrix.arch }}
          path: release-artifacts/**
          if-no-files-found: error
